services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 5s
      retries: 5

  contract-service:
    build: ./contract_service
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: contracts
    depends_on:
      kafka:
        condition: service_healthy

  judgment-service:
    build: ./judgment_service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CONSUME_TOPIC: contracts
      PRODUCE_TOPIC: judgments
    depends_on:
      - kafka

  limbo-service:
    build: ./limbo_service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CONSUME_TOPIC: judgments
      PRODUCE_TOPIC: ascensions
    depends_on:
      - kafka

  revelation-service:
    build: ./revelation_service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CONSUME_TOPIC: ascensions
      PRODUCE_TOPIC: revelations
    depends_on:
      - kafka

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://contract-service:8000
    depends_on:
      - contract-service
